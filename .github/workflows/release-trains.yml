name: Release Trains

on:
  schedule:
    - cron: "0 6 * * *" # Daily nightly at 03:00 America/Halifax during daylight time
    - cron: "0 7 * * *" # Daily nightly at 03:00 America/Halifax during standard time
    - cron: "0 12 * * 1" # Monday weekly at 09:00 America/Halifax during daylight time
    - cron: "0 13 * * 1" # Monday weekly at 09:00 America/Halifax during standard time
  workflow_dispatch:
    inputs:
      channel:
        description: "Release train to build"
        required: true
        type: choice
        options:
          - nightly
          - weekly

permissions:
  contents: read

env:
  XCODE_VERSION: "26.6"
  PROJECT_PATH: "Visual Timer.xcodeproj"
  IOS_SCHEME: "Visual Timer"
  WATCH_SCHEME: "Visual Timer Watch Watch App"
  DERIVED_DATA_PATH: ".build/DerivedData"

jobs:
  resolve:
    name: Resolve release train
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.release_train.outputs.should_run }}
      channel: ${{ steps.release_train.outputs.channel }}
      branch: ${{ steps.release_train.outputs.branch }}
    steps:
      - name: Map trigger to channel and branch
        id: release_train
        shell: bash
        run: |
          set -euo pipefail

          should_run=true
          channel=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            channel="${{ inputs.channel }}"
          else
            schedule="${{ github.event.schedule }}"
            scheduled_hour="$(printf '%s\n' "$schedule" | awk '{ print $2 }')"
            local_slot="$(TZ=America/Halifax date +%u-%H)"
            offset="$(TZ=America/Halifax date +%z)"

            case "$offset" in
              -0300)
                nightly_hour=6
                weekly_hour=12
                ;;
              -0400)
                nightly_hour=7
                weekly_hour=13
                ;;
              *)
                echo "::error title=Unexpected Halifax UTC offset::America/Halifax reported offset $offset."
                exit 1
                ;;
            esac

            if [ "$scheduled_hour" = "$nightly_hour" ] && [ "$local_slot" = "$(TZ=America/Halifax date +%u)-03" ]; then
              channel="nightly"
            elif [ "$scheduled_hour" = "$weekly_hour" ] && [ "$local_slot" = "1-09" ]; then
              channel="weekly"
            else
              should_run=false
              channel="skipped"
              echo "::notice title=Inactive cron skipped::Cron '$schedule' is not the active America/Halifax slot for offset $offset."
            fi
          fi

          {
            echo "should_run=$should_run"
            echo "channel=$channel"
            echo "branch=$channel"
          } >> "$GITHUB_OUTPUT"

  ship:
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    name: Ship ${{ needs.resolve.outputs.channel }}
    runs-on: macos-26
    concurrency:
      group: release-trains-${{ needs.resolve.outputs.channel }}
      cancel-in-progress: false
    env:
      CHANNEL: ${{ needs.resolve.outputs.channel }}
      TRAIN_BRANCH: ${{ needs.resolve.outputs.branch }}
      APP_STORE_CONNECT_API_KEY_JSON: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_SSH_KEY: ${{ secrets.MATCH_GIT_SSH_KEY }}
    steps:
      - name: Checkout train branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TRAIN_BRANCH }}
          fetch-depth: 0

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            .build/DerivedData
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-dd-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-dd-
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Resolve packages
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$IOS_SCHEME"

      - name: Select simulator destinations
        id: destinations
        shell: bash
        run: |
          set -euo pipefail

          devices_json="$(mktemp)"
          xcrun simctl list devices available --json > "$devices_json"

          ios_udid="$(jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.isAvailable == true and (.name | startswith("iPhone")))][0].udid // ""' "$devices_json")"

          if [ -n "$ios_udid" ]; then
            {
              echo "ios_destination=platform=iOS Simulator,id=$ios_udid"
              echo "ios_simulator_udid=$ios_udid"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "ios_destination=generic/platform=iOS Simulator"
              echo "ios_simulator_udid="
            } >> "$GITHUB_OUTPUT"
            echo "::notice title=No concrete iOS simulator::Build-for-testing will use a generic iOS Simulator destination and unit tests will be skipped."
          fi

      - name: Prepare result bundles
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .build/results
          mkdir -p .build/results

      - name: Build iOS app for testing
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT_PATH" \
            -scheme "$IOS_SCHEME" \
            -configuration Debug \
            -destination "${{ steps.destinations.outputs.ios_destination }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath ".build/results/VisualTimer-iOS-Build.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$WATCH_SCHEME" \
            -configuration Debug \
            -destination "generic/platform=watchOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath ".build/results/VisualTimer-watchOS-Build.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS unit tests
        shell: bash
        run: |
          set -euo pipefail

          simulator_id="${{ steps.destinations.outputs.ios_simulator_udid }}"
          if [ -z "$simulator_id" ]; then
            echo "::notice title=Unit tests skipped::No concrete iOS simulator was available on this runner; build-for-testing remains the gate."
            exit 0
          fi

          xcrun simctl boot "$simulator_id" >/tmp/visualtimer-simctl-boot.log 2>&1 || true
          if ! xcrun simctl bootstatus "$simulator_id" -b; then
            cat /tmp/visualtimer-simctl-boot.log
            echo "::notice title=Unit tests skipped::The runner's iOS simulator runtime did not boot; build-for-testing remains the gate."
            exit 0
          fi

          xcodebuild test-without-building \
            -project "$PROJECT_PATH" \
            -scheme "$IOS_SCHEME" \
            -configuration Debug \
            -destination "${{ steps.destinations.outputs.ios_destination }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath ".build/results/VisualTimer-iOS-Tests.xcresult" \
            -only-testing:"Visual TimerTests" \
            CODE_SIGNING_ALLOWED=NO

      - name: Configure match SSH key
        if: env.APP_STORE_CONNECT_API_KEY_JSON != '' && env.MATCH_PASSWORD != '' && env.MATCH_GIT_SSH_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_GIT_SSH_KEY" > ~/.ssh/match_git_ssh_key
          chmod 600 ~/.ssh/match_git_ssh_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/match_git_ssh_key -o IdentitiesOnly=yes" >> "$GITHUB_ENV"

      - name: Set up Ruby
        if: env.APP_STORE_CONNECT_API_KEY_JSON != '' && env.MATCH_PASSWORD != '' && env.MATCH_GIT_SSH_KEY != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Upload to TestFlight
        if: env.APP_STORE_CONNECT_API_KEY_JSON != '' && env.MATCH_PASSWORD != '' && env.MATCH_GIT_SSH_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          api_key_path="$RUNNER_TEMP/app-store-connect-api-key.json"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_JSON" > "$api_key_path"
          export APP_STORE_CONNECT_API_KEY_PATH="$api_key_path"
          bundle exec fastlane beta channel:"$CHANNEL"

      - name: Skip TestFlight upload without secrets
        if: env.APP_STORE_CONNECT_API_KEY_JSON == '' || env.MATCH_PASSWORD == '' || env.MATCH_GIT_SSH_KEY == ''
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -n "$APP_STORE_CONNECT_API_KEY_JSON" ] || missing+=("APP_STORE_CONNECT_API_KEY_JSON")
          [ -n "$MATCH_PASSWORD" ] || missing+=("MATCH_PASSWORD")
          [ -n "$MATCH_GIT_SSH_KEY" ] || missing+=("MATCH_GIT_SSH_KEY")
          printf -v missing_csv '%s, ' "${missing[@]}"
          missing_csv="${missing_csv%, }"
          echo "::notice title=Compile-only release train::Skipping TestFlight upload for $CHANNEL; missing secrets: $missing_csv."
